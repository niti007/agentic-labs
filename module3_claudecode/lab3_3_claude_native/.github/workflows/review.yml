# Lab 3.3 (Claude-native) - headless Claude Code in CI (REFERENCE COPY).
# This nested copy is for reading/walkthrough. The LIVE copy that GitHub actually runs
# lives at the repo root: agentic-labs/.github/workflows/ci-review.yml (same content).
# Runs the test suite, then headless Claude Code (-p) to review and emit STRUCTURED JSON,
# which a downstream step parses into a pass/fail gate.
name: ci-review

on:
  pull_request:
  workflow_dispatch:

jobs:
  test-and-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run tests
        working-directory: agentic-labs/module3_claudecode/lab3_3_claude_native
        run: |
          pip install pytest
          python -m pytest -q

      # Headless Claude Code: -p runs one prompt non-interactively.
      # --output-format json emits a machine-readable result for the gate.
      - name: Claude review (headless, JSON out)
        working-directory: agentic-labs/module3_claudecode/lab3_3_claude_native
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          npm install -g @anthropic-ai/claude-code
          claude -p "Review calc.py for correctness and missing edge cases. Reply with ONLY a JSON object {\"verdict\": \"pass\"|\"fail\", \"issues\": [\"...\"]}." \
            --output-format json > review.json
          cat review.json

      - name: Parse review into pass/fail gate
        working-directory: agentic-labs/module3_claudecode/lab3_3_claude_native
        run: python parse_output.py review.json
